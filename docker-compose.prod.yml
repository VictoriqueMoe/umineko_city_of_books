networks:
  observability:
    external: true

services:
  postgres:
    image: postgres:latest
    container_name: umineko-postgres
    restart: unless-stopped
    env_file:
      - postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5007:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  umineko-city-of-books:
    image: ghcr.io/victoriquemoe/umineko_city_of_books:latest
    container_name: umineko-city-of-books
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2312:4323"
    env_file:
      - .env
      - postgres.env
    volumes:
      - ./data:/app/data
      - ./fcm-service-account.json:/app/fcm-service-account.json:ro
    networks:
      - default
      - observability
    labels:
      prometheus-scrape: "true"
      prometheus-job: "umineko-city-of-books"
      prometheus-port: "4323"
      prometheus-path: "/metrics"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:4323/livez"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  valkey:
    image: valkey/valkey:latest
    container_name: umineko-valkey
    restart: unless-stopped
    network_mode: host
    command: valkey-server --appendonly yes --dir /data --bind 127.0.0.1 --port 6380
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "6380", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  livekit:
    image: livekit/livekit-server:latest
    container_name: umineko-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    network_mode: host
    depends_on:
      - valkey
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  livekit-ingress:
    image: livekit/ingress:latest
    container_name: umineko-livekit-ingress
    restart: unless-stopped
    network_mode: host
    depends_on:
      - valkey
      - livekit
    environment:
      INGRESS_CONFIG_FILE: /etc/ingress.yaml
    volumes:
      - ./ingress.yaml:/etc/ingress.yaml:ro

  livekit-egress:
    image: livekit/egress:latest
    container_name: umineko-livekit-egress
    restart: unless-stopped
    network_mode: host
    cap_add:
      - SYS_ADMIN
    depends_on:
      - valkey
      - livekit
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      - ./data/hls:/app/data/hls

volumes:
  postgres_data:
  valkey_data:
