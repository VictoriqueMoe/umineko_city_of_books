networks:
  observability:
    external: true

services:
  postgres:
    image: postgres:latest
    container_name: umineko-postgres
    restart: unless-stopped
    env_file:
      - postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5007:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  umineko-city-of-books:
    image: ghcr.io/victoriquemoe/umineko_city_of_books:latest
    container_name: umineko-city-of-books
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2312:4323"
    env_file:
      - .env
      - postgres.env
    volumes:
      - ./data:/app/data
      - ./fcm-service-account.json:/app/fcm-service-account.json:ro
    networks:
      - default
      - observability
    labels:
      prometheus-scrape: "true"
      prometheus-job: "umineko-city-of-books"
      prometheus-port: "4323"
      prometheus-path: "/metrics"

  # Host-networked so livekit, ingress and valkey reach each other on 127.0.0.1.
  # On this box, livekit.yaml and ingress.yaml must use redis address 127.0.0.1:6379
  # and ingress rtc_config.use_external_ip: true. Open 8080/tcp (WHIP) and 7885/udp
  # (WHIP media) on the host firewall.
  valkey:
    image: valkey/valkey:latest
    container_name: umineko-valkey
    restart: unless-stopped
    network_mode: host
    command: valkey-server --save "" --appendonly no --bind 127.0.0.1 --port 6380

  livekit:
    image: livekit/livekit-server:latest
    container_name: umineko-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    network_mode: host
    depends_on:
      - valkey
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  livekit-ingress:
    image: livekit/ingress:latest
    container_name: umineko-livekit-ingress
    restart: unless-stopped
    network_mode: host
    depends_on:
      - valkey
      - livekit
    environment:
      INGRESS_CONFIG_FILE: /etc/ingress.yaml
    volumes:
      - ./ingress.yaml:/etc/ingress.yaml:ro

volumes:
  postgres_data:
