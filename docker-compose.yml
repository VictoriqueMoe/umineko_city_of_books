networks:
  observability:
    external: true

services:
  postgres:
    image: postgres:latest
    container_name: umineko-postgres
    restart: unless-stopped
    env_file:
      - postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5007:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  umineko-city-of-books:
    build: .
    container_name: umineko-city-of-books
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2312:4323"
    env_file:
      - .env
      - postgres.env
    volumes:
      - ./data:/app/data
    networks:
      - default
      - observability
    labels:
      prometheus-scrape: "true"
      prometheus-job: "umineko-city-of-books"
      prometheus-port: "4323"
      prometheus-path: "/metrics"

volumes:
  postgres_data:
