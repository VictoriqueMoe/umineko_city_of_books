services:
  umineko-city-of-books:
    build: .
    container_name: umineko-city-of-books
    restart: unless-stopped
    ports:
      - "2312:4323"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  glitchtip-postgres:
    image: postgres:18
    container_name: glitchtip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: "trust"
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql

  glitchtip:
    image: glitchtip/glitchtip:6
    container_name: glitchtip
    restart: unless-stopped
    depends_on:
      - glitchtip-postgres
    ports:
      - "8000:8000"
    env_file:
      - .env.glitchtip
    volumes:
      - glitchtip-uploads:/code/uploads

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  glitchtip-pg-data:
  glitchtip-uploads:
  prometheus-data:
  grafana-data:
